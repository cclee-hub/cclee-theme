name: Sync cclee-theme to open source repo

on:
  push:
    branches:
      - master
    paths:
      - 'wp/wordpress/wp-content/themes/cclee-theme/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wordpress repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout cclee-theme repo
        uses: actions/checkout@v4
        with:
          repository: cclee-hub/cclee-theme
          token: ${{ secrets.CCLEE_THEME_PAT }}
          path: cclee-theme-repo

      - name: Sync theme files
        run: |
          cd cclee-theme-repo
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -r "$GITHUB_WORKSPACE/wp/wordpress/wp-content/themes/cclee-theme/"* .
          cp -r "$GITHUB_WORKSPACE/wp/wordpress/wp-content/themes/cclee-theme/".* . 2>/dev/null || true

      - name: Commit and push changes
        run: |
          cd cclee-theme-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || {
            git commit -m "sync: from wordpress repo"
            git push origin main
          }

  deploy:
    needs: sync
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to demo server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEMO_HOST }}
          username: ${{ secrets.DEMO_USER }}
          key: ${{ secrets.DEMO_SSH_KEY }}
          script: |
            git config --global --add safe.directory /var/www/wp-demo/wordpress/wp-content/themes/cclee-theme
            cd /var/www/wp-demo/wordpress/wp-content/themes/cclee-theme
            git fetch origin
            git reset --hard origin/main

            # Reset FSE templates to use theme files (remove database overrides)
            TEMPLATE_PARTS=$(docker exec demo_cli wp post list --post_type=wp_template_part --field=ID --allow-root)
            [ -n "$TEMPLATE_PARTS" ] && docker exec demo_cli wp post delete $TEMPLATE_PARTS --force --allow-root || true
            TEMPLATES=$(docker exec demo_cli wp post list --post_type=wp_template --field=ID --allow-root)
            [ -n "$TEMPLATES" ] && docker exec demo_cli wp post delete $TEMPLATES --force --allow-root || true

            # Bind navigation menu to header
            NAV_ID=$(docker exec demo_cli wp post list --post_type=wp_navigation --name=main-menu --field=ID --allow-root)
            if [ -n "$NAV_ID" ]; then
              sed -i "s/{\"overlayMenu\":\"never\"/{\"ref\":$NAV_ID,\"overlayMenu\":\"never\"/" parts/header.html
              docker exec demo_cli wp cache flush --allow-root
            fi
