name: Sync cclee-toolkit to open source repo

on:
  push:
    branches:
      - master
    paths:
      - 'wp/wordpress/wp-content/plugins/cclee-toolkit/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wordpress repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout cclee-toolkit repo
        uses: actions/checkout@v4
        with:
          repository: cclee-hub/cclee-toolkit
          token: ${{ secrets.CCLEE_THEME_PAT }}
          path: cclee-toolkit-repo

      - name: Sync plugin files
        run: |
          cd cclee-toolkit-repo
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -r "$GITHUB_WORKSPACE/wp/wordpress/wp-content/plugins/cclee-toolkit/"* .
          cp -r "$GITHUB_WORKSPACE/wp/wordpress/wp-content/plugins/cclee-toolkit/".* . 2>/dev/null || true

      - name: Commit and push changes
        run: |
          cd cclee-toolkit-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || {
            git commit -m "sync: from wordpress repo"
            # Push to whatever branch we checked out (main for cclee-toolkit)
            git push origin HEAD:main
          }
