<!DOCTYPE HTML>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui" />
<meta name="format-detection" content="telephone=no" />
<title>{sort:title}</title>
<meta name="keywords" content="{sort:keywords}">
<meta name="description" content="{sort:description}">
<link href="{pboot:sitedomain}/m/css/style.css" rel="stylesheet">
<link href="{pboot:sitedomain}/m/css/common.css" rel="stylesheet">
<script src="{pboot:sitedomain}/m/js/autofontsize.min.js"></script>
<script src="{pboot:sitedomain}/m/js/jquery.js"></script>
<script src="{pboot:sitedomain}/m/js/clipboard.min.js"></script>
<script src="{pboot:sitedomain}/m/js/common.js"></script>
<script src="{pboot:sitedomain}/m/js/jquery.tips.js"></script>
<script src="{pboot:sitedomain}/m/js/jquery.validator.js"></script>
<script src="{pboot:sitedomain}/m/js/zh_cn.js"></script>
<script src="{pboot:sitedomain}/js/jquery-1.12.4.min.js" ></script>
</head>
<body>
{include file=comm/head.html}
<!--位置开始--> 
{include file=comm/left.html}
<!--位置结束--> 
<!--单页内容开始-->
<section class="contactPage"> 
  <!--留言表单开始-->
  <ul class="login">
  <form class="my-4" onSubmit="return submsg(this);">
      <li>
        <input type="text" name="contacts" id="contacts" maxlength="20" placeholder="姓名" class="login_input " />
      </li>
      <li>
        <input type="text" name="mobile" required id="mobile"  maxlength="20" placeholder="手机号码" class="login_input" >
      </li>
      <li>
        <textarea name="content"  id="content"  cols="" rows="" onKeyUp="strlen_verify(this,'booklen',255)" placeholder="咨询内容" class="login_textarea" ></textarea>
      </li>
      <li>
        <input class="login_btn common_bg" type="submit" value="提   交">
      </li>
    </form>
  </ul>
  <!--留言表单结束--> 
</section>
<!--单页内容结束--> 
<script>

//ajax提交留言
function submsg(obj){
  var url='{pboot:msgaction}';
  var contacts=$(obj).find("#contacts").val();
  var mobile=$(obj).find("#mobile").val();
  var content=$(obj).find("#content").val();
  var checkcode=$(obj).find("#checkcode").val();
  
  $.ajax({
    type: 'POST',
    url: url,
    dataType: 'json',
    data: {
    	contacts: contacts,
    	mobile: mobile,
    	content: content,
    	checkcode: checkcode
    },
    success: function (response, status) {
      if(response.code){
		 alert("谢谢您的反馈，我们会尽快联系您！");
		 $(obj)[0].reset(); 
      }else{
    	 alert(response.data);
      }
    },
    error:function(xhr,status,error){
      alert('返回数据异常！');
    }
  });
  return false;
}
</script>
{include file=comm/foot.html}
</body>
</html>
