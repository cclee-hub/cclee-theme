<!-- wp:group {"tagName":"main","anchor":"main","align":"full","style":{"spacing":{"padding":{"top":"var(--wp--preset--spacing--60)","bottom":"var(--wp--preset--spacing--80)"}}},"layout":{"type":"constrained"}} -->
<main class="wp-block-group alignfull" id="main" tabindex="-1" style="padding-top:var(--wp--preset--spacing--60);padding-bottom:var(--wp--preset--spacing--80)">

	<!-- wp:heading {"textAlign":"center","level":1,"textColor":"primary","fontSize":"heading-1","style":{"spacing":{"margin":{"bottom":"var(--wp--preset--spacing--50)"}}}} -->
	<h1 class="wp-block-heading has-text-align-center has-primary-color has-text-color has-heading-1-font-size" style="margin-bottom:var(--wp--preset--spacing--50)">Shopping Cart</h1>
	<!-- /wp:heading -->

	<!-- wp:woocommerce/cart -->
	<div class="wp-block-woocommerce-cart alignwide is-loading">

		<!-- wp:woocommerce/filled-cart-block -->
		<div class="wp-block-woocommerce-filled-cart-block">

			<!-- wp:woocommerce/cart-items-block -->
			<div class="wp-block-woocommerce-cart-items-block"></div>
			<!-- /wp:woocommerce/cart-items-block -->

			<!-- wp:woocommerce/cart-totals-block -->
			<div class="wp-block-woocommerce-cart-totals-block">

				<!-- wp:woocommerce/cart-order-summary-block -->
				<div class="wp-block-woocommerce-cart-order-summary-block"></div>
				<!-- /wp:woocommerce/cart-order-summary-block -->

				<!-- wp:woocommerce/cart-express-payment-block -->
				<div class="wp-block-woocommerce-cart-express-payment-block"></div>
				<!-- /wp:woocommerce/cart-express-payment-block -->

				<!-- wp:woocommerce/proceed-to-checkout-block -->
				<div class="wp-block-woocommerce-proceed-to-checkout-block"></div>
				<!-- /wp:woocommerce/proceed-to-checkout-block -->

			</div>
			<!-- /wp:woocommerce/cart-totals-block -->

		</div>
		<!-- /wp:woocommerce/filled-cart-block -->

		<!-- wp:woocommerce/empty-cart-block -->
		<div class="wp-block-woocommerce-empty-cart-block">

			<!-- wp:group {"layout":{"type":"constrained"}} -->
			<div class="wp-block-group">

				<!-- wp:spacer {"height":"var:preset|spacing|40"} -->
				<div style="height:var(--wp--preset--spacing--40)" aria-hidden="true" class="wp-block-spacer"></div>
				<!-- /wp:spacer -->

				<!-- wp:paragraph {"align":"center","textColor":"neutral-500","fontSize":"large","style":{"spacing":{"margin":{"bottom":"var(--wp--preset--spacing--30)"}}}} -->
				<p class="has-text-align-center has-neutral-500-color has-text-color has-large-font-size" style="margin-bottom:var(--wp--preset--spacing--30)">Your cart is currently empty.</p>
				<!-- /wp:paragraph -->

				<!-- wp:buttons {"layout":{"type":"flex","justifyContent":"center"}} -->
				<div class="wp-block-buttons is-content-justification-center">
					<!-- wp:button {"backgroundColor":"contrast","textColor":"base"} -->
					<div class="wp-block-button"><a href="/products/" class="wp-block-button__link has-base-color has-contrast-background-color has-text-color has-background wp-element-button">Browse Products</a></div>
					<!-- /wp:button -->
				</div>
				<!-- /wp:buttons -->

				<!-- wp:spacer {"height":"var:preset|spacing|60"} -->
				<div style="height:var(--wp--preset--spacing--60)" aria-hidden="true" class="wp-block-spacer"></div>
				<!-- /wp:spacer -->

			</div>
			<!-- /wp:group -->

		</div>
		<!-- /wp:woocommerce/empty-cart-block -->

	</div>
	<!-- /wp:woocommerce/cart -->

</main>
<!-- /wp:group -->
