<!-- wp:group {"tagName":"main","anchor":"main","align":"full","style":{"spacing":{"padding":{"top":"var(--wp--preset--spacing--70)","bottom":"var(--wp--preset--spacing--70)"}}},"layout":{"type":"constrained"}} -->
<main class="wp-block-group alignfull" id="main" style="padding-top:var(--wp--preset--spacing--70);padding-bottom:var(--wp--preset--spacing--70)">

	<!-- wp:group {"align":"wide","layout":{"type":"constrained"}} -->
	<div class="wp-block-group alignwide">

		<!-- wp:paragraph {"textColor":"secondary","style":{"typography":{"lineHeight":"1.8"},"spacing":{"margin":{"bottom":"var(--wp--preset--spacing--60)"}}}} -->
		<p class="has-secondary-color has-text-color" style="line-height:1.8;margin-bottom:var(--wp--preset--spacing--60)">Save your favorite items here. When you're ready, add them to your cart and checkout.</p>
		<!-- /wp:paragraph -->

		<!-- wp:group {"className":"cclee-wishlist-grid","layout":{"type":"constrained"}} -->
		<div class="wp-block-group cclee-wishlist-grid">

			<!-- wp:group {"style":{"spacing":{"padding":{"top":"var(--wp--preset--spacing--40)","right":"var(--wp--preset--spacing--40)","bottom":"var(--wp--preset--spacing--40)","left":"var(--wp--preset--spacing--40)"}},"border":{"radius":"var(--wp--custom--border--radius--lg)","width":"1px","style":"solid"}},"borderColor":"neutral-200","layout":{"type":"constrained"}} -->
			<div class="wp-block-group has-border-color has-neutral-200-border-color" style="border-style:solid;border-width:1px;border-radius:var(--wp--custom--border--radius--lg);padding-top:var(--wp--preset--spacing--40);padding-right:var(--wp--preset--spacing--40);padding-bottom:var(--wp--preset--spacing--40);padding-left:var(--wp--preset--spacing--40)">

				<!-- wp:columns {"style":{"spacing":{"gap":{"left":"var(--wp--preset--spacing--40)"}}}} -->
				<div class="wp-block-columns">
					<!-- wp:column {"width":"25%"} -->
					<div class="wp-block-column" style="flex-basis:25%">
						<!-- wp:image {"sizeSlug":"thumbnail","style":{"border":{"radius":"var(--wp--custom--border--radius--md)"}}} -->
						<figure class="wp-block-image size-thumbnail" style="border-radius:var(--wp--custom--border--radius--md)"><img src="#" alt="Product"/></figure>
						<!-- /wp:image -->
					</div>
					<!-- /wp:column -->
					<!-- wp:column {"width":"50%"} -->
					<div class="wp-block-column" style="flex-basis:50%">
						<!-- wp:heading {"level":3,"textColor":"primary","fontSize":"medium","style":{"spacing":{"margin":{"bottom":"var(--wp--preset--spacing--20)"}}}} -->
						<h3 class="wp-block-heading has-primary-color has-text-color has-medium-font-size" style="margin-bottom:var(--wp--preset--spacing--20)">Product Name</h3>
						<!-- /wp:heading -->
						<!-- wp:paragraph {"textColor":"neutral-500","fontSize":"small"} -->
						<p class="has-neutral-500-color has-text-color has-small-font-size">SKU: ABC123</p>
						<!-- /wp:paragraph -->
						<!-- wp:paragraph {"textColor":"accent","fontSize":"medium","style":{"typography":{"fontWeight":"600"}}} -->
						<p class="has-accent-color has-text-color has-medium-font-size" style="font-weight:600">$99.00</p>
						<!-- /wp:paragraph -->
					</div>
					<!-- /wp:column -->
					<!-- wp:column {"width":"25%"} -->
					<div class="wp-block-column" style="flex-basis:25%">
						<!-- wp:buttons {"layout":{"type":"flex","flexWrap":"nowrap"}} -->
						<div class="wp-block-buttons">
							<!-- wp:button {"backgroundColor":"accent","textColor":"base","size":"small"} -->
							<div class="wp-block-button has-small-font-size"><a class="wp-block-button__link has-base-color has-accent-background-color has-text-color has-background wp-element-button">Add to Cart</a></div>
							<!-- /wp:button -->
						</div>
						<!-- /wp:buttons -->
						<!-- wp:paragraph {"textColor":"neutral-500","fontSize":"small","style":{"spacing":{"margin":{"top":"var(--wp--preset--spacing--20)"}}}} -->
						<p class="has-neutral-500-color has-text-color has-small-font-size" style="margin-top:var(--wp--preset--spacing--20)"><a href="#">Remove</a></p>
						<!-- /wp:paragraph -->
					</div>
					<!-- /wp:column -->
				</div>
				<!-- /wp:columns -->

			</div>
			<!-- /wp:group -->

			<!-- wp:group {"style":{"spacing":{"padding":{"top":"var(--wp--preset--spacing--40)","right":"var(--wp--preset--spacing--40)","bottom":"var(--wp--preset--spacing--40)","left":"var(--wp--preset--spacing--40)"},"margin":{"top":"var(--wp--preset--spacing--30)"}},"border":{"radius":"var(--wp--custom--border--radius--lg)","width":"1px","style":"solid"}},"borderColor":"neutral-200","layout":{"type":"constrained"}} -->
			<div class="wp-block-group has-border-color has-neutral-200-border-color" style="border-style:solid;border-width:1px;border-radius:var(--wp--custom--border--radius--lg);padding-top:var(--wp--preset--spacing--40);padding-right:var(--wp--preset--spacing--40);padding-bottom:var(--wp--preset--spacing--40);padding-left:var(--wp--preset--spacing--40);margin-top:var(--wp--preset--spacing--30)">

				<!-- wp:paragraph {"align":"center","textColor":"neutral-500","fontSize":"medium"} -->
				<p class="has-text-align-center has-neutral-500-color has-text-color has-medium-font-size">Your wishlist is empty. <a href="/shop/">Browse products</a></p>
				<!-- /wp:paragraph -->

			</div>
			<!-- /wp:group -->

		</div>
		<!-- /wp:group -->

	</div>
	<!-- /wp:group -->

</main>
<!-- /wp:group -->
