							<th class="has-text-align-center" data-align="center">Product C</th>

					</thead>

						</tr>
						<tr>
							<td class="has-text-align-left" data-align="left"><strong>Availability</strong></td>
							<td class="has-text-align-center" data-align="center"><span>In Stock</span></td>

							<td class="has-text-align-center" data-align="center">1 Year</td>
							<td class="has-text-align-center" data-align="center">2 Years</td>
							<td class="has-text-align-center" data-align="center">3 Years</td>

						<tr>

						<tr>
							<td class="has-text-align-left" data-align="left"></td>
							<td class="has-text-align-center" data-align="center">

								<!-- /wp:button -->

							<td class="has-text-align-center" data-align="center">
								<!-- wp:button {"backgroundColor":"accent","textColor":"base","size":"small"} -->

							<td class="has-text-align-center" data-align="center">
